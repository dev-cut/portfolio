name: Supabase Keep Alive

# 매주 월요일, 수요일, 금요일 오전 9시(KST, UTC+9 → UTC 0시)에 실행
on:
  schedule:
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase 활성 상태 유지 핑
        run: |
          echo "🏓 Supabase keep-alive 핑 전송 중..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase 응답 성공 (HTTP $RESPONSE)"
          else
            echo "❌ Supabase 응답 실패 (HTTP $RESPONSE)"
            exit 1
          fi

      - name: 타임스탬프 기록
        run: |
          echo "⏰ 실행 시각: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S KST')"
